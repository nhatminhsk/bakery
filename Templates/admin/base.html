<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard - BubbleBakery{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background-color: #1f2937;
            border-right: 1px solid #374151;
            padding: 2rem 0;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 0 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #fff;
        }

        .sidebar-logo-icon {
            width: 35px;
            height: 35px;
            background: linear-gradient(to bottom right, #fb923c, #ea580c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .sidebar-logo-text {
            font-weight: 600;
            color: #fb923c;
        }

        .sidebar-section-title {
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 1.5rem;
            color: #d1d5db;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover {
            background-color: rgba(251, 146, 60, 0.1);
            color: #fb923c;
            border-left-color: #fb923c;
        }

        .sidebar-nav a.active {
            background-color: rgba(251, 146, 60, 0.1);
            color: #fb923c;
            border-left-color: #fb923c;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
        }

        /* Admin Header */
        .admin-header {
            background-color: #1f2937;
            border-bottom: 1px solid #374151;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            sticky-top: 0;
            z-index: 40;
        }

        .admin-header-title {
            font-size: 1.5rem;
            color: #fb923c;
        }

        .admin-header-actions {
            display: flex;
            gap: 1rem;
        }

        .admin-btn {
            padding: 10px 20px;
            background-color: #fb923c;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .admin-btn:hover {
            background-color: #ea580c;
        }

        /* Content Area */
        .content {
            padding: 2rem;
            flex: 1;
            overflow-y: auto;
        }

        .page-title {
            font-size: 2rem;
            color: #fb923c;
            margin-bottom: 2rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background-color: #1f2937;
            border-radius: 8px;
            border: 1px solid #374151;
            padding: 1.5rem;
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #9ca3af;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            color: #fb923c;
            font-weight: bold;
        }

        /* Table */
        .admin-table {
            width: 100%;
            background-color: #1f2937;
            border-radius: 8px;
            border: 1px solid #374151;
            overflow: hidden;
        }

        .admin-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            background-color: #111827;
            color: #fb923c;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #374151;
        }

        .admin-table td {
            padding: 1rem;
            border-bottom: 1px solid #374151;
            color: #d1d5db;
        }

        .admin-table tr:hover {
            background-color: rgba(251, 146, 60, 0.05);
        }

        .admin-table tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-success {
            background-color: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-pending {
            background-color: rgba(251, 146, 60, 0.2);
            color: #fb923c;
        }

        .status-error {
            background-color: rgba(220, 38, 38, 0.2);
            color: #dc2626;
        }

        @media (max-width: 768px) {
            .admin-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: auto;
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #374151;
                padding: 1rem;
                display: none;
            }

            .sidebar.active {
                display: block;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="/" class="sidebar-logo">
                <div class="sidebar-logo-icon">🍔</div>
                <span class="sidebar-logo-text">BubbleBakery</span>
            </a>

            <div class="sidebar-section-title">MENU</div>
            <nav class="sidebar-nav">
                <a href="/admin/overview" {% if request.path =='/admin/overview' %}class="active"{% endif %}>
                    📊 Tổng Quan
                </a>
                <a href="/admin/dashboard" {% if request.path =='/admin/dashboard' %}class="active"{% endif %}>
                    📈 Dashboard
                </a>
                <a href="/admin/new-orders" {% if request.path =='/admin/new-orders' %}class="active"{% endif %}>
                    📦 Đơn Hàng Mới
                </a>
                <a href="/admin/products" {% if request.path =='/admin/products' %}class="active"{% endif %}>
                    🛍️ Sản Phẩm
                </a>
            </nav>

            <div class="sidebar-section-title">QUẢN LÝ</div>
            <nav class="sidebar-nav">
                <a href="/admin/todo-lists" {% if request.path =='/admin/todo-lists' %}class="active"{% endif %}>
                    ✓ Công Việc
                </a>
                <a href="/admin/feedbacks" {% if request.path =='/admin/feedbacks' %}class="active"{% endif %}>
                    💬 Phản Hồi
                </a>
                <a href="/admin/settings" {% if request.path =='/admin/settings' %}class="active"{% endif %}>
                    ⚙️ Cài Đặt
                </a>
            </nav>

            <div style="padding: 1.5rem; margin-top: auto; border-top: 1px solid #374151;">
                <a href="/" style="color: #fb923c; text-decoration: none; display: flex; align-items: center; gap: 8px;">
                    👈 Quay về trang chính
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <header class="admin-header">
                <h1 class="admin-header-title">{% block page_title %}Admin Panel{% endblock %}</h1>
                <div class="admin-header-actions">
                    <button class="admin-btn">👤 Admin</button>
                    <button class="admin-btn" onclick="logout()">🚪 Đăng Xuất</button>
                </div>
            </header>

            <div class="content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script>
        function logout() {
            alert('Bạn đã đăng xuất!');
            window.location.href = '/login';
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
